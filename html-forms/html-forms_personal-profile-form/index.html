<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h2>Create your Personal Profile</h2>
    <form>
    <fieldset>
      <legend>Personal Profile</legend>
    
      <p>We want to get to know you! Please enter your personal information.</p>
      <label for="first-name">First Name</label> <input type="text" id="first.name" />
      <label for="last-name">Last Name</label> <input type="text" id="last.name" />
      <label for="Your-Birthday">Your Birthday</label> <input type="date" id="date" />
    </fieldset>
     <p>Can you tell us a little bit more? We want to annoy you with unwanted ads.</p>
     <Fieldset>
      <legend>Further Information</legend>
      <label for="favorite-color">Favorite Color:</label> <input type="color" value="#E5430F" id="color" />
      <label for="favorite-pet">What's your favorite pet?</label> 
      <select id="favorite-pet">
  <option value="Agra Cadabra">Agra Cadabra</option>
  <option value="Chicken Turtle">Chicken Turtle</option>
  <option value="Fried Egg Jellyfish">Fried Egg Jellyfish</option>
</select>


      
    
  </fieldset>
  <button type="submit">Submit</button>
  </form>
  </body>
</html>
